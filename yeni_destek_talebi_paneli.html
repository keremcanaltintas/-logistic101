<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Support Request</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface-variant": "#3d4a41",
                        "on-primary-container": "#f6fff6",
                        "on-surface": "#0b1c30",
                        "primary-container": "#008558",
                        "on-error": "#ffffff",
                        "secondary-fixed-dim": "#c6c6c9",
                        "inverse-on-surface": "#eaf1ff",
                        "on-tertiary": "#ffffff",
                        "surface-dim": "#cbdbf5",
                        "on-tertiary-fixed-variant": "#434847",
                        "secondary-fixed": "#e2e2e5",
                        "background": "#f8f9ff",
                        "primary-fixed": "#7bfabb",
                        "on-primary": "#ffffff",
                        "surface-tint": "#006c46",
                        "tertiary": "#595d5c",
                        "on-primary-fixed": "#002112",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed-variant": "#005234",
                        "inverse-surface": "#213145",
                        "tertiary-fixed": "#e0e3e2",
                        "error": "#ba1a1a",
                        "on-secondary-container": "#636467",
                        "surface-container-low": "#eff4ff",
                        "surface-container": "#e5eeff",
                        "error-container": "#ffdad6",
                        "on-tertiary-fixed": "#181c1c",
                        "tertiary-container": "#717575",
                        "on-secondary-fixed": "#1a1c1e",
                        "on-background": "#0b1c30",
                        "surface-variant": "#d3e4fe",
                        "primary-fixed-dim": "#5ddda1",
                        "on-error-container": "#93000a",
                        "surface-container-high": "#dce9ff",
                        "secondary-container": "#e2e2e5",
                        "surface": "#f8f9ff",
                        "on-tertiary-container": "#fafdfc",
                        "tertiary-fixed-dim": "#c4c7c6",
                        "outline-variant": "#bccabf",
                        "secondary": "#5d5e61",
                        "surface-container-highest": "#d3e4fe",
                        "inverse-primary": "#5ddda1",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed-variant": "#454749",
                        "primary": "#006a44",
                        "surface-bright": "#f8f9ff",
                        "outline": "#6d7a71"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "section-margin": "1.5rem",
                        "container-padding": "2rem",
                        "inner-padding": "1.25rem",
                        "grid-gutter": "1rem",
                        "element-gap": "1rem"
                    },
                    "fontFamily": {
                        "body-md": ["Manrope"],
                        "headline-lg": ["Manrope"],
                        "label-bold": ["Manrope"],
                        "body-lg": ["Manrope"],
                        "label-caps": ["Manrope"],
                        "headline-md": ["Manrope"]
                    },
                    "fontSize": {
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "headline-lg": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-bold": ["14px", { "lineHeight": "18px", "fontWeight": "600" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "500" }],
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "headline-md": ["18px", { "lineHeight": "24px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Manrope', sans-serif; background-color: #f8f9ff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 2rem; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); box-shadow: 0px 20px 50px rgba(0,0,0,0.08); border-radius: 1rem; border: 1px solid rgba(255,255,255,0.2); }
        .recessed-card { background-color: #F8FAFC; border: 1px solid #E2E8F0; box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.02); }
        .bubble-btn { transition: all 0.2s ease; border: 1px solid transparent; }
        .bubble-btn:hover { transform: translateY(-2px); box-shadow: 0px 4px 12px rgba(0,0,0,0.05); }
        .bubble-btn:active { transform: translateY(0); }
        
        /* Semantic colors for bubbles based on request */
        .bubble-yellow { border-color: #fef08a; } .bubble-yellow:hover { background-color: #fef9c3; }
        .bubble-blue { border-color: #bfdbfe; } .bubble-blue:hover { background-color: #dbeafe; }
        .bubble-purple { border-color: #e9d5ff; } .bubble-purple:hover { background-color: #f3e8ff; }
        .bubble-orange { border-color: #fed7aa; } .bubble-orange:hover { background-color: #ffedd5; }
    </style>
</head>
<body class="bg-background text-on-surface">
<main class="glass-panel w-full max-w-[800px] flex flex-col relative overflow-hidden">
<!-- Background decorative blob (subtle) -->
<div class="absolute top-0 right-0 -mr-20 -mt-20 w-64 h-64 rounded-full bg-surface-container-high opacity-50 blur-3xl -z-10"></div>
<div class="absolute bottom-0 left-0 -ml-20 -mb-20 w-80 h-80 rounded-full bg-surface-variant opacity-40 blur-3xl -z-10"></div>
<!-- TopAppBar -->
<header class="flex justify-between items-center px-inner-padding py-4 w-full border-b border-surface-container-high">
<h1 class="font-headline-md text-headline-md font-bold text-on-surface">Yeni Destek Talebi Oluştur</h1>
<button aria-label="Close" class="text-on-surface-variant hover:bg-surface-container-high transition-colors p-2 rounded-full active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</header>
<!-- Content Area -->
<div class="px-container-padding py-section-margin flex flex-col gap-section-margin z-10">
<!-- Order Detail Card -->
<section class="recessed-card rounded-lg p-inner-padding flex flex-col gap-4">
<div class="flex justify-between items-center">
<span class="text-primary font-headline-md text-headline-md font-bold">#1024</span>
<span class="font-label-caps text-label-caps text-secondary uppercase tracking-wider">PREPARİNG</span>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="flex items-center gap-2">
<span class="text-secondary font-body-md text-body-md">Müşteri:</span>
<span class="text-on-surface font-label-bold text-label-bold">Kerem Yılmaz</span>
</div>
<div class="flex items-center gap-2">
<span class="text-secondary font-body-md text-body-md">Tutar:</span>
<span class="text-on-surface font-label-bold text-label-bold">3700</span>
</div>
</div>
<div class="flex flex-col gap-1">
<span class="text-secondary font-body-md text-body-md">Mevcut Ürün:</span>
<span class="text-on-surface font-label-bold text-label-bold">Wireless Ergonomik Mouse (x1), RGB Mekanik Klavye (x1)</span>
</div>
<div class="flex flex-col gap-1">
<span class="text-secondary font-body-md text-body-md">Mevcut Adres:</span>
<span class="text-on-surface font-label-bold text-label-bold">Kadıköy Mahallesi, Moda Caddesi No:12 D:4, İstanbul</span>
</div>
</section>
<!-- Actions Section -->
<section class="flex flex-col gap-element-gap">
<h2 class="font-headline-md text-headline-md text-on-surface mb-2">Talep Türü / Yapılacak İşlem</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-element-gap">
<button class="bubble-btn bubble-yellow bg-surface-container-lowest rounded-lg p-4 flex items-center justify-center gap-3">
<span class="material-symbols-outlined text-yellow-500" data-icon="bolt">bolt</span>
<span class="font-label-bold text-label-bold text-on-surface">Aciliyet Bildir</span>
</button>
<button class="bubble-btn bubble-blue bg-surface-container-lowest rounded-lg p-4 flex items-center justify-center gap-3">
<span class="material-symbols-outlined text-blue-500" data-icon="map">map</span>
<span class="font-label-bold text-label-bold text-on-surface">Adres Değişikliği</span>
</button>
<button class="bubble-btn bubble-purple bg-surface-container-lowest rounded-lg p-4 flex items-center justify-center gap-3">
<span class="material-symbols-outlined text-purple-500" data-icon="swap_horiz">swap_horiz</span>
<span class="font-label-bold text-label-bold text-on-surface">Ürün Değişimi</span>
</button>
<button class="bubble-btn bubble-orange bg-surface-container-lowest rounded-lg p-4 flex items-center justify-center gap-3">
<span class="material-symbols-outlined text-orange-500" data-icon="pause">pause</span>
<span class="font-label-bold text-label-bold text-on-surface">Siparişi Beklet</span>
</button>
</div>
</section>
</div>
<!-- Footer -->
<footer class="flex justify-between items-center px-inner-padding py-4 border-t border-surface-container-high bg-surface-container-lowest mt-auto z-10">
<button class="text-secondary border border-outline-variant rounded-lg px-6 py-3 font-label-bold text-label-bold hover:bg-surface-container-low transition-colors active:scale-95">
                Geri
            </button>
<div class="flex gap-element-gap">
<button class="text-secondary border border-outline-variant rounded-lg px-6 py-3 font-label-bold text-label-bold hover:bg-surface-container-low transition-colors active:scale-95">
                    İptal
                </button>
<button class="bg-primary text-on-primary rounded-lg px-6 py-3 font-label-bold text-label-bold hover:shadow-md hover:brightness-110 active:translate-y-0.5 transition-all">
                    Talebi Gönder
                </button>
</div>
</footer>
</main>
</body></html>
